name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path "requirements.txt") { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconfirm --windowed --uac-admin --name edge_duplex run.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EdgeDuplex-Windows
        path: dist/edge_duplex.exe

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: EdgeDuplex-Windows

    - name: Extract Changelog
      id: extract_changelog
      run: |
        awk '/^## /{if (p) exit; p=1; print "**Automated Build from GitHub Actions**\n\n- 💻 Windows EXE attached\n"; next} p' CHANGELOG.md > release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        name: "EdgeDuplex ${{ github.ref_name }}"
        tag_name: "${{ github.ref_name }}"
        files: |
          edge_duplex.exe
        body_path: release_notes.md
